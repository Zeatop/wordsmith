apiVersion: apps/v1
kind: Deployment
metadata:
  name: words
  labels:
    app: words
  namespace: wordsmith
spec:
  replicas: 1
  selector:
    matchLabels:
      app: words
  template:
    metadata:
      labels:
        app: words
    spec:
      containers:
        - name: words
          image: lezed/words:latest
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: words
spec:
  type: NodePort
  selector:
    app: words
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30090