name: Build and Push Wordsmith Images

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - name: web
            context: ./web
          - name: words
            context: ./words
          - name: db
            context: ./db
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push all images
        run: |
          REPO="${{ secrets.DOCKERHUB_USERNAME }}/wordsmith"
          docker build -t "$REPO:${{ matrix.image.name }}" \
            -t "$REPO:${{ matrix.image.name }}-pr-${{ github.event.pull_request.number }}" \
            -t "$REPO:${{ matrix.image.name }}-${{ github.sha }}" \
            ${{ matrix.image.context }}
          docker push "$REPO:${{ matrix.image.name }}"
          docker push "$REPO:${{ matrix.image.name }}-pr-${{ github.event.pull_request.number }}"
          docker push "$REPO:${{ matrix.image.name }}-${{ github.sha }}"