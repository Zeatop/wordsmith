name: Build and Push Wordsmith Images

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push all images
        run: |
          REPO="${{ secrets.DOCKERHUB_USERNAME }}/wordsmith"
          for img in web words db; do
            docker build -t "$REPO:$img" -t "$REPO:$img-pr-${{ github.event.pull_request.number }}" -t "$REPO:$img-${{ github.sha }}" $img
            docker push "$REPO:$img"
            docker push "$REPO:$img-pr-${{ github.event.pull_request.number }}"
            docker push "$REPO:$img-${{ github.sha }}"
          done