name: Build Wordsmith Images

on:
  push:
    branches:
      - main

env:
  DOCKERHUB_REPOSITORY: ${{ vars.DOCKERHUB_REPOSITORY != '' && vars.DOCKERHUB_REPOSITORY || format('{0}/wordsmith', secrets.DOCKERHUB_USERNAME) }}

jobs:
  build-and-push:
    name: Build and push ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: web
            context: ./web
          - name: words
            context: ./words
          - name: db
            context: ./db

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPOSITORY }}:${{ matrix.image.name }}
            ${{ env.DOCKERHUB_REPOSITORY }}:${{ matrix.image.name }}-pr-${{ github.event.pull_request.number }}
            ${{ env.DOCKERHUB_REPOSITORY }}:${{ matrix.image.name }}-${{ github.sha }}