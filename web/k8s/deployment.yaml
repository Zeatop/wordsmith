apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  labels:
    app: web
  namespace: wordsmith
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: lezed/web:latest
          ports:
            - containerPort: 8080

apiVersion: v1
kind: Service
metadata:
  name: web
spec:
  type: NodePort
  selector:
    app: web
    namespace: wordsmith
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30091