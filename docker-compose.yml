services:
  web:
    image: lezed/wordsmith:web
    ports:
      - "8080:80"
    volumes:
      - ./web/static:/app/static
    depends_on:
      - words

  words:
    image: lezed/wordsmith:words
    depends_on:
      db:
        condition: service_healthy

  db:
    image: lezed/wordsmith:db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5